<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Terminal frame -->
  <rect x="1" y="3" width="22" height="18" rx="2" ry="2"/>
  <!-- Top bar dots -->
  <circle cx="5" cy="7" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="8" cy="7" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="11" cy="7" r="0.8" fill="currentColor" stroke="none"/>
  <!-- Prompt chevron -->
  <polyline points="4,13 7,15.5 4,18" stroke-width="1.8"/>
  <!-- Play arrow (trigger) -->
  <polygon points="11,13 11,18 17,15.5" fill="currentColor" stroke="none"/>
</svg>
